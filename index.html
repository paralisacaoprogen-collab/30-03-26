<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XFC- Quinta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        [x-cloak] { display: none !important; }

        body { 
            font-family: 'Inter', sans-serif; 
            color: white; 
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('XFC.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pos-GOL { background: #ef4444; } 
        .pos-ZAG { background: #3b82f6; }
        .pos-MEI { background: #22c55e; } 
        .pos-ATA { background: #f59e0b; }
    </style>
</head>
<body x-data="sorteioApp()" x-init="init()">

    <header class="bg-amarelo-600/90 backdrop-blur-md p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-extrabold italic text-xl tracking-tighter">XFC ARENA</h1>
            <div class="flex gap-2">
                <span class="text-[10px] bg-black/40 px-2 py-1 rounded font-bold self-center" x-text="jogadores.length + ' JOGADORES'"></span>
                <button @click="limparTudo()" class="text-[10px] bg-red-700/80 px-2 py-1 rounded font-bold uppercase hover:bg-red-600 transition">Zerar</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        
        <div x-show="etapa === 'cadastro'" class="space-y-6">
            <button @click="showModalCadastro = true" class="w-full bg-green-500 py-5 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all">
                ⚽ ENTRAR NA LISTA
            </button>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <template x-for="jogador in jogadores" :key="jogador.id">
                    <div class="glass-card p-4 rounded-2xl flex justify-between items-center animate-fade-in">
                        <div class="flex items-center gap-4">
                            <div :class="'w-10 h-10 rounded-xl flex items-center justify-center font-bold text-xs pos-' + jogador.posicao" x-text="jogador.posicao"></div>
                            <div>
                                <div class="font-bold text-base" x-text="jogador.nome"></div>
                                <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest" x-text="'Nível ' + jogador.nivel + ' • ' + jogador.tipo"></div>
                            </div>
                        </div>
                        <span x-show="jogador.tipo === 'mensalista'" class="text-yellow-500 text-lg">⭐</span>
                    </div>
                </template>
            </div>

            <button x-show="jogadores.length >= 2" @click="sortearTimes()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xl shadow-lg hover:bg-blue-500 transition">
                SORTEAR TIMES ⚡
            </button>
        </div>

        <div x-show="etapa === 'resultado'" class="space-y-6" x-cloak>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <template x-for="(time, index) in timesGerados">
                    <div class="glass-card rounded-3xl overflow-hidden border-2 border-green-500/30">
                        <div class="bg-green-600 p-3 font-black italic text-center uppercase tracking-widest" x-text="'Time ' + (index + 1)"></div>
                        <div class="p-4 space-y-2">
                            <template x-for="jogador in time">
                                <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center">
                                    <span class="font-bold" x-text="jogador.nome"></span>
                                    <span class="text-[10px] px-2 py-1 rounded bg-black/20 font-mono" x-text="jogador.posicao"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
            <button @click="etapa = 'cadastro'" class="w-full bg-slate-800 py-4 rounded-2xl font-bold uppercase text-xs tracking-widest hover:bg-slate-700 transition">Voltar para a Lista</button>
        </div>
    </main>

    <div x-show="showModalCadastro" class="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4 backdrop-blur-sm" x-cloak>
        <div class="glass-card p-8 rounded-3xl w-full max-w-sm space-y-5 border border-white/20 shadow-2xl">
            <h3 class="font-black text-2xl italic text-green-400 text-center uppercase">XFC Cadastro</h3>
            
            <div class="space-y-4">
                <input x-model="novoJogador.nome" type="text" placeholder="Seu nome" class="w-full bg-slate-900/80 p-4 rounded-xl outline-none border border-white/10 focus:border-green-500 text-white transition-all">
                
                <div class="grid grid-cols-2 gap-2">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">Posição</label>
                        <select x-model="novoJogador.posicao" class="bg-slate-900/80 p-4 rounded-xl text-sm border border-white/10 outline-none appearance-none">
                            <option value="GOL">Goleiro</option>
                            <option value="ZAG">Zagueiro</option>
                            <option value="MEI">Meio-Campo</option>
                            <option value="ATA">Atacante</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">Nível (1-3)</label>
                        <select x-model="novoJogador.nivel" class="bg-slate-900/80 p-4 rounded-xl text-sm border border-white/10 outline-none appearance-none">
                            <option value="1">Bronze (Nível 1)</option>
                            <option value="2" selected>Prata (Nível 2)</option>
                            <option value="3">Ouro (Nível 3)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 pt-2">
                    <button @click="novoJogador.tipo = 'mensalista'" :class="novoJogador.tipo === 'mensalista' ? 'bg-yellow-600 ring-2 ring-white/50' : 'bg-slate-800'" class="py-3 rounded-xl text-[10px] font-bold uppercase transition-all">Mensalista</button>
                    <button @click="novoJogador.tipo = 'visitante'" :class="novoJogador.tipo === 'visitante' ? 'bg-blue-600 ring-2 ring-white/50' : 'bg-slate-800'" class="py-3 rounded-xl text-[10px] font-bold uppercase transition-all">Visitante</button>
                </div>
            </div>

            <button @click="adicionarJogador()" class="w-full bg-green-500 py-4 rounded-xl font-black italic shadow-lg shadow-green-900/40 active:scale-95 transition-all">SALVAR NA NUVEM</button>
            <button @click="showModalCadastro = false" class="w-full text-slate-400 text-xs font-bold uppercase tracking-tighter hover:text-white transition">Cancelar</button>
        </div>
    </div>

    <script>
        const API_URL = "https://api.npoint.io/984e78ad13082606114b";

        function sorteioApp() {
            return {
                etapa: 'cadastro',
                showModalCadastro: false,
                jogadores: [],
                novoJogador: { nome: '', nivel: "2", posicao: 'MEI', tipo: 'mensalista' },
                timesGerados: [],

                async init() {
                    // Carregamento inicial
                    await this.syncData();
                    
                    // Polling: Sincroniza com a nuvem a cada 4 segundos
                    setInterval(() => {
                        if (!this.showModalCadastro && this.etapa === 'cadastro') {
                            this.syncData();
                        }
                    }, 4000);
                },

                async syncData() {
                    try {
                        const res = await fetch(API_URL);
                        const data = await res.json();
                        
                        // Só atualiza o estado se houver mudança real (evita flicker na tela)
                        const dataStr = JSON.stringify(data);
                        const localStr = JSON.stringify(this.jogadores);
                        
                        if (dataStr !== localStr) {
                            this.jogadores = Array.isArray(data) ? data : [];
                        }
                    } catch (e) { 
                        console.error("Erro na sincronização automática."); 
                    }
                },

                async adicionarJogador() {
                    if (!this.novoJogador.nome.trim()) return alert("Por favor, digite seu nome!");
                    
                    const novo = { 
                        ...this.novoJogador, 
                        id: Date.now(), 
                        nivel: parseInt(this.novoJogador.nivel) 
                    };
                    
                    const novaLista = [...this.jogadores, novo];
                    
                    // Bloqueia interface e envia
                    try {
                        const res = await fetch(API_URL, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(novaLista)
                        });

                        if (res.ok) {
                            this.jogadores = novaLista;
                            this.showModalCadastro = false;
                            this.novoJogador.nome = ''; // Limpa o campo
                        }
                    } catch (e) {
                        alert("Falha ao salvar. Verifique sua conexão.");
                    }
                },

                async limparTudo() {
                    if (confirm("ATENÇÃO: Deseja apagar a lista inteira para TODOS?")) {
                        try {
                            await fetch(API_URL, { 
                                method: 'PUT', 
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify([]) 
                            });
                            this.jogadores = [];
                        } catch (e) {
                            alert("Erro ao limpar dados.");
                        }
                    }
                },

                sortearTimes() {
                    if (this.jogadores.length < 2) return;

                    // Embaralha a lista aleatoriamente primeiro
                    let lista = [...this.jogadores].sort(() => Math.random() - 0.5);
                    
                    // Ordena por nível para equilibrar (os melhores ficam no topo)
                    lista.sort((a, b) => b.nivel - a.nivel);
                    
                    const time1 = [];
                    const time2 = [];
                    
                    // Distribui alternadamente entre os times (Serpente: A-B, B-A)
                    lista.forEach((jogador, index) => {
                        if (index % 2 === 0) {
                            time1.push(jogador);
                        } else {
                            time2.push(jogador);
                        }
                    });

                    this.timesGerados = [time1, time2];
                    this.etapa = 'resultado';
                    
                    // Efeito de celebração
                    confetti({
                        particleCount: 200,
                        spread: 80,
                        origin: { y: 0.6 },
                        colors: ['#22c55e', '#ffffff', '#1d4ed8']
                    });
                }
            }
        }
    </script>
</body>
</html>
