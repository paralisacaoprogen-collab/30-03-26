<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Sorteio - Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .pos-GOL { background: #ef4444; } 
        .pos-ZAG { background: #3b82f6; }
        .pos-MEI { background: #22c55e; } 
        .pos-ATA { background: #f59e0b; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="sorteioApp()">

    <header class="bg-green-600 p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-extrabold italic text-xl">ARENA SORTEIO</h1>
            <div class="flex gap-2">
                <span class="text-[10px] bg-black/20 px-2 py-1 rounded font-bold" x-text="jogadores.length + ' NO JOGO'"></span>
                <button @click="limparTudo()" class="text-[10px] bg-red-700 px-2 py-1 rounded font-bold uppercase">Zerar</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        
        <div x-show="etapa === 'cadastro'" class="space-y-6">
            <button @click="showModalCadastro = true" class="w-full bg-green-500 py-4 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-transform">
                ⚽ ENTRAR NA LISTA
            </button>

            <div class="grid grid-cols-2 gap-4 bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                <div>
                    <label class="text-[10px] text-slate-400 block mb-1 font-bold uppercase">Times</label>
                    <div class="flex items-center gap-3">
                        <button @click="numeroTimes = Math.max(2, numeroTimes - 1)" class="bg-slate-700 w-8 h-8 rounded-lg">-</button>
                        <span class="font-bold text-xl" x-text="numeroTimes"></span>
                        <button @click="numeroTimes++" class="bg-slate-700 w-8 h-8 rounded-lg">+</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 block mb-1 font-bold uppercase">Equilíbrio</label>
                    <select x-model="metodoSorteio" class="bg-slate-700 w-full p-2 rounded-lg text-sm outline-none border-none">
                        <option value="equilibrado">Balanceado ★</option>
                        <option value="aleatorio">Aleatório 🎲</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                <template x-for="jogador in jogadores" :key="jogador.id">
                    <div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center border border-white/5">
                        <div class="flex items-center gap-3">
                            <div :class="'w-8 h-8 rounded-lg flex items-center justify-center font-bold text-[10px] pos-' + jogador.posicao" x-text="jogador.posicao"></div>
                            <div>
                                <div class="font-semibold text-sm flex items-center gap-1">
                                    <span x-text="jogador.nome"></span>
                                    <span x-show="jogador.tipo === 'mensalista'" class="text-yellow-500 text-[10px]">⭐</span>
                                </div>
                                <div class="text-[9px] text-slate-500 font-bold uppercase" x-text="jogador.tipo"></div>
                            </div>
                        </div>
                    </div>
                </template>
                <div x-show="jogadores.length === 0" class="col-span-full text-center py-10 text-slate-500 text-sm italic">
                    Nenhum jogador na lista...
                </div>
            </div>

            <button x-show="jogadores.length >= (numeroTimes * 2)" @click="sortearTimes()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xl shadow-lg shadow-blue-900/20">
                SORTEAR AGORA ⚡
            </button>
        </div>

        <div x-show="etapa === 'resultado'" class="space-y-6" x-cloak>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <template x-for="(time, index) in timesGerados">
                    <div class="bg-slate-800/60 rounded-3xl overflow-hidden border border-white/10">
                        <div class="bg-green-600 p-3 font-black italic flex justify-between items-center">
                            <span x-text="'TIME ' + (index + 1)"></span>
                            <span class="text-[10px] bg-black/20 px-2 py-1 rounded" x-text="time.length + ' JOGADORES'"></span>
                        </div>
                        <div class="p-3 space-y-2">
                            <template x-for="jogador in time">
                                <div class="bg-white/5 p-2 rounded-xl flex justify-between items-center text-sm border border-white/5">
                                    <span class="font-bold uppercase" x-text="jogador.nome"></span>
                                    <span class="text-[9px] opacity-50 font-mono" x-text="jogador.posicao"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
            <button @click="etapa = 'cadastro'" class="w-full bg-slate-700 py-4 rounded-2xl font-bold uppercase text-sm tracking-widest">
                Voltar para a Lista
            </button>
        </div>
    </main>

    <div x-show="showModalCadastro" class="fixed inset-0 bg-black/95 z-[60] flex items-center justify-center p-4" x-cloak>
        <div class="bg-slate-800 p-6 rounded-3xl w-full max-w-sm space-y-4 border border-white/10 shadow-2xl">
            <h3 class="font-black text-xl italic text-green-500">NOVO JOGADOR</h3>
            <input x-model="novoJogador.nome" type="text" placeholder="Nome do Craque" class="w-full bg-slate-700 p-4 rounded-xl outline-none ring-green-500 focus:ring-2 text-white placeholder:text-slate-500">
            
            <div class="grid grid-cols-2 gap-2">
                <select x-model="novoJogador.posicao" class="bg-slate-700 p-3 rounded-xl text-sm text-white outline-none">
                    <option value="GOL">Goleiro</option>
                    <option value="ZAG">Zagueiro</option>
                    <option value="MEI">Meio-Campo</option>
                    <option value="ATA">Atacante</option>
                </select>
                <select x-model="novoJogador.nivel" class="bg-slate-700 p-3 rounded-xl text-sm text-white outline-none">
                    <option value="1">⭐ Básico</option>
                    <option value="2" selected>⭐⭐ Médio</option>
                    <option value="3">⭐⭐⭐ Pro</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button @click="novoJogador.tipo = 'mensalista'" :class="novoJogador.tipo === 'mensalista' ? 'bg-yellow-600 ring-2 ring-yellow-400' : 'bg-slate-700'" class="py-3 rounded-xl text-[10px] font-bold transition-all">MENSALISTA</button>
                <button @click="novoJogador.tipo = 'visitante'" :class="novoJogador.tipo === 'visitante' ? 'bg-blue-600 ring-2 ring-blue-400' : 'bg-slate-700'" class="py-3 rounded-xl text-[10px] font-bold transition-all">VISITANTE</button>
            </div>

            <div class="flex gap-3 pt-2">
                <button @click="showModalCadastro = false" class="flex-1 text-slate-400 font-bold text-sm">CANCELAR</button>
                <button @click="adicionarJogador()" class="flex-1 bg-green-500 py-3 rounded-xl font-bold italic shadow-lg shadow-green-900/20">SALVAR</button>
            </div>
        </div>
    </div>

    <div x-show="showPixModal" class="fixed inset-0 bg-black/95 z-[70] flex items-center justify-center p-4" x-cloak>
        <div class="bg-slate-800 p-6 rounded-3xl w-full max-w-sm text-center space-y-6 border border-yellow-500 shadow-2xl">
            <h3 class="font-black text-xl text-yellow-500 italic">PAGAMENTO VISITANTE</h3>
            <p class="text-xs text-slate-400 leading-relaxed">Olá! Para confirmar sua vaga como visitante, realize o PIX de <b>R$ 15,00</b>.</p>
            <div class="bg-black/40 p-4 rounded-xl break-all text-[10px] font-mono text-slate-300 border border-white/5" x-text="pixCopiaECola"></div>
            <button @click="copiarPix()" class="w-full bg-slate-700 py-3 rounded-xl text-xs font-bold uppercase tracking-wider">Copiar Código PIX</button>
            <button @click="confirmarPagamento()" class="w-full bg-green-600 py-4 rounded-2xl font-black italic shadow-lg shadow-green-900/40">JÁ REALIZEI O PIX ✅</button>
        </div>
    </div>

    <script>
        const API_URL = "https://api.npoint.io/984e78ad13082606114b";

        function sorteioApp() {
            return {
                etapa: 'cadastro',
                showModalCadastro: false,
                showPixModal: false,
                jogadores: [],
                numeroTimes: 2,
                metodoSorteio: 'equilibrado',
                novoJogador: { nome: '', nivel: 2, posicao: 'MEI', tipo: 'mensalista' },
                timesGerados: [],
                pixCopiaECola: "00020101021126360014br.gov.bcb.pix011442180353000160520400005303986540515.005802BR5920ALMEIDA REPRESENTACO6009SAO PAULO62070503***630428BB",

                async init() {
                    // Carrega dados iniciais
                    await this.syncData();
                    // Atualiza a cada 5 segundos para que todos vejam as mudanças
                    setInterval(() => this.syncData(), 5000);
                },

                async syncData() {
                    try {
                        const res = await fetch(API_URL);
                        const data = await res.json();
                        // Se o npoint estiver vazio, ele retorna um objeto, então garantimos que seja array
                        this.jogadores = Array.isArray(data) ? data : [];
                    } catch (e) { 
                        console.error("Erro ao sincronizar dados.");
                    }
                },

                async pushData(novaLista) {
                    try {
                        await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(novaLista)
                        });
                    } catch (e) { 
                        alert("Erro ao salvar dados na nuvem.");
                    }
                },

                async adicionarJogador() {
                    if (!this.novoJogador.nome.trim()) {
                        alert("Por favor, digite o nome!");
                        return;
                    }

                    if (this.novoJogador.tipo === 'visitante' && !this.showPixModal) {
                        this.showPixModal = true;
                        return;
                    }

                    const novo = { 
                        ...this.novoJogador, 
                        id: Date.now(),
                        nivel: parseInt(this.novoJogador.nivel)
                    };
                    
                    const listaLocal = [...this.jogadores, novo];
                    
                    // Salva na nuvem e atualiza localmente
                    await this.pushData(listaLocal);
                    this.jogadores = listaLocal;

                    this.showModalCadastro = false;
                    this.showPixModal = false;
                    this.novoJogador = { nome: '', nivel: 2, posicao: 'MEI', tipo: 'mensalista' };
                },

                confirmarPagamento() { this.adicionarJogador(); },
                
                copiarPix() { 
                    navigator.clipboard.writeText(this.pixCopiaECola); 
                    alert("Código PIX copiado com sucesso!"); 
                },

                async limparTudo() {
                    if(confirm("Deseja zerar a lista de jogadores para todos?")) {
                        await this.pushData([]);
                        this.jogadores = [];
                    }
                },

                sortearTimes() {
                    // 1. Embaralha a lista
                    let lista = [...this.jogadores].sort(() => Math.random() - 0.5);
                    
                    // 2. Se equilibrado, ordena por nível técnico (serpente)
                    if (this.metodoSorteio === 'equilibrado') {
                        lista.sort((a, b) => b.nivel - a.nivel);
                    }
                    
                    const res = Array.from({ length: this.numeroTimes }, () => []);
                    
                    // 3. Distribuição tipo "Serpente" para maior equilíbrio
                    lista.forEach((j, i) => {
                        const tIdx = i % this.numeroTimes;
                        const reverse = Math.floor(i / this.numeroTimes) % 2 !== 0;
                        if (reverse) {
                            res[this.numeroTimes - 1 - tIdx].push(j);
                        } else {
                            res[tIdx].push(j);
                        }
                    });

                    this.timesGerados = res;
                    this.etapa = 'resultado';
                    confetti({
                        particleCount: 150,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#22c55e', '#ffffff', '#16a34a']
                    });
                }
            }
        }
    </script>
</body>
</html>
